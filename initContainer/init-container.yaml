# Init Containers são executados antes dos containers principais
# O init container sobe antes do Nginx iniciar
apiVersion: apps/v1
kind: Deployment
metadata:
  name: init-container-demo
  namespace: init-container
  labels:
    app: init-container-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: init-container-demo
  template:
    metadata:
      labels:
        app: init-container-demo
    spec:
      initContainers:
      - name: init-download
        image: busybox
        command: [ "wget", "-O", "/data/index.html", "https://www.example.com/" ]
        volumeMounts:
        - name: shared-data
          mountPath: /data  # Volume compartilhado com o container principal
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: shared-data
          mountPath: /usr/share/nginx/html  # Nginx serve o arquivo baixado pelo init container
        resources:
          requests:
            cpu: "10m"
            memory: "56Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
      volumes:
      - name: shared-data
        emptyDir: {}  # Volume temporário que existe enquanto o Pod existir

# Service para expor o Nginx do Init Container 
apiVersion: v1
kind: Service
metadata:
  name: init-container-service
  namespace: init-container
spec:
  type: NodePort
  selector:
    app: init-container-demo
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80

